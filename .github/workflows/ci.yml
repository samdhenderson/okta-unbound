# Continuous Integration Workflow
# This workflow runs builds, tests, and validation on pull requests and pushes

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate manifest.json
      run: |
        echo "Validating manifest.json..."
        node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))"
        echo "✅ manifest.json is valid JSON"

    - name: TypeScript type checking
      run: npx tsc --noEmit

    - name: Build extension
      run: npm run build

    - name: Check build artifacts
      run: |
        echo "Checking build output..."
        test -d dist || (echo "❌ dist directory not created" && exit 1)
        test -f dist/manifest.json || (echo "❌ dist/manifest.json missing" && exit 1)
        echo "✅ Build artifacts present"

    - name: Check required source files
      run: |
        echo "Checking required source files..."
        test -f README.md || (echo "❌ README.md missing" && exit 1)
        test -f LICENSE || (echo "❌ LICENSE missing" && exit 1)
        test -f manifest.json || (echo "❌ manifest.json missing" && exit 1)
        test -f package.json || (echo "❌ package.json missing" && exit 1)
        test -f tsconfig.json || (echo "❌ tsconfig.json missing" && exit 1)
        test -f vite.config.ts || (echo "❌ vite.config.ts missing" && exit 1)
        echo "✅ All required files present"

    - name: Check source structure
      run: |
        echo "Checking directory structure..."
        test -d assets/icons || (echo "❌ assets/icons directory missing" && exit 1)
        test -d src || (echo "❌ src directory missing" && exit 1)
        test -d src/background || (echo "❌ src/background directory missing" && exit 1)
        test -d src/content || (echo "❌ src/content directory missing" && exit 1)
        test -d src/sidepanel || (echo "❌ src/sidepanel directory missing" && exit 1)
        test -d src/shared || (echo "❌ src/shared directory missing" && exit 1)
        echo "✅ Directory structure valid"

    - name: Verify icon files
      run: |
        echo "Checking icon files..."
        test -f assets/icons/icon16.png || (echo "❌ icon16.png missing" && exit 1)
        test -f assets/icons/icon48.png || (echo "❌ icon48.png missing" && exit 1)
        test -f assets/icons/icon128.png || (echo "❌ icon128.png missing" && exit 1)
        echo "✅ All icon files present"

    - name: Verify React components
      run: |
        echo "Checking React components..."
        test -f src/sidepanel/App.tsx || (echo "❌ App.tsx missing" && exit 1)
        test -f src/sidepanel/main.tsx || (echo "❌ main.tsx missing" && exit 1)
        test -d src/sidepanel/components || (echo "❌ components directory missing" && exit 1)
        test -d src/sidepanel/hooks || (echo "❌ hooks directory missing" && exit 1)
        echo "✅ All React components present"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: extension-build
        path: dist/
        retention-days: 7

    - name: Success
      run: echo "🎉 All CI checks passed!"
