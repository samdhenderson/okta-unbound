name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Format gate (npm run format:check) is enabled after the one-time repo-wide
      # `npm run format` reformat lands as its own commit (ADR-0003).

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm run test:run
      # Coverage gate (npm run test:coverage, thresholds 80/75) is added here once
      # component tests land (Phase 4). Enabling it now would fail on legacy debt.
