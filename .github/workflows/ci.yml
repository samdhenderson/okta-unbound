name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test + coverage gate
        # Runs the jsdom unit project with the 80/75 coverage thresholds enforced
        # (vitest.config.ts). Replaces the old bare `test:run`; §8 raised coverage
        # above threshold so the gate is now enforced in CI.
        run: npm run test:coverage

  # Component explorer build gate (ADR-0010). Runs in parallel with `verify` (no
  # `needs:`), so it never delays the fast lint/type/test feedback. A broken or
  # mis-imported story fails the PR.
  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Storybook build cache
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/storybook
          key: storybook-${{ hashFiles('package-lock.json', '.storybook/**') }}
          restore-keys: |
            storybook-

      - name: Build Storybook
        run: npm run build-storybook -- --quiet

      # Run every story as a headless-browser render test (9 have play/assert fns).
      # VITEST_BROWSER_EXECUTABLE is intentionally unset here so Playwright uses the
      # browser installed below (the pinned-sandbox path only exists locally).
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Story browser tests
        run: npm run test:storybook
