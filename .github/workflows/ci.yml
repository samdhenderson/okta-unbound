# Continuous Integration Workflow
# This workflow runs basic checks on pull requests and pushes

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Validate manifest.json
      run: |
        echo "Validating manifest.json..."
        node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))"
        echo "✅ manifest.json is valid JSON"

    - name: Check required files exist
      run: |
        echo "Checking required files..."
        test -f README.md || (echo "❌ README.md missing" && exit 1)
        test -f LICENSE || (echo "❌ LICENSE missing" && exit 1)
        test -f manifest.json || (echo "❌ manifest.json missing" && exit 1)
        test -f src/popup.html || (echo "❌ src/popup.html missing" && exit 1)
        test -f src/popup.js || (echo "❌ src/popup.js missing" && exit 1)
        test -f src/popup.css || (echo "❌ src/popup.css missing" && exit 1)
        test -f src/content.js || (echo "❌ src/content.js missing" && exit 1)
        test -f src/background.js || (echo "❌ src/background.js missing" && exit 1)
        echo "✅ All required files present"

    - name: Check file structure
      run: |
        echo "Checking directory structure..."
        test -d assets/icons || (echo "❌ assets/icons directory missing" && exit 1)
        test -d src || (echo "❌ src directory missing" && exit 1)
        test -d docs || (echo "❌ docs directory missing" && exit 1)
        echo "✅ Directory structure valid"

    - name: Verify icon files
      run: |
        echo "Checking icon files..."
        test -f assets/icons/icon16.png || (echo "❌ icon16.png missing" && exit 1)
        test -f assets/icons/icon48.png || (echo "❌ icon48.png missing" && exit 1)
        test -f assets/icons/icon128.png || (echo "❌ icon128.png missing" && exit 1)
        echo "✅ All icon files present"

    - name: Success
      run: echo "🎉 All CI checks passed!"
